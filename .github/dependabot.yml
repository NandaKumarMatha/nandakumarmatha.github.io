version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      mui:
        patterns:
          - "@mui/*"
          - "@emotion/*"
      react:
        patterns:
          - "react"
          - "react-dom"
